<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 강아지 vs 고양이</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle">🌙 다크 모드</button>
    <div class="container">
        <h1>나의 동물상 테스트</h1>
        <p class="subtitle">강아지상? 고양이상? AI가 분석해드립니다!</p>

        <div id="test-container">
            <button type="button" id="start-btn" onclick="init()">분석 시작하기</button>
            <div id="webcam-container"></div>
            <div id="label-container"></div>
        </div>

        <div class="partnership-form">
            <hr>
            <h2>제휴 문의</h2>
...

                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="이메일 주소를 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="company">회사명/서비스명</label>
                    <input type="text" id="company" name="company" placeholder="회사나 서비스명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요"></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>

        <div class="comments-section">
            <hr>
            <h2>댓글</h2>

</html>
